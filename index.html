            $(document).ready(function() {
                $('.album').click(function() {
                    var link = this.id; 
                    $('article').empty();
                    var agora = new Date();
                    $('article').load('./'+link+'.html?time='+agora.getTime(),function(){
                        $('aside').hide("slide", { direction: "left" }, 1000);
                    });
                });
                $('article a').lightBox();
            });
        </script>
