
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic bxSlider Example</title>
    <!-- 1. Load bxSlider CSS -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    
    <!-- 2. Load jQuery (Required) -->
    <script src="https://googleapis.com"></script>
    
    <!-- 3. Load bxSlider JS -->
    <script src="https://jsdelivr.net"></script>

    <!-- 4. Initialize the Slider -->
    <script>
        $(document).ready(function(){
    $('.bxslider').bxSlider({
      mode: 'fade',
      captions: true,
      slideWidth: 600
    });
  });
    </script>
</head>
<body>

<div class="bxslider">
  <div><img src='images (19).jpeg' title="Coffee 1" /></div>
  <div><img src='images (19).jpeg' title="Coffee 2" /></div>
  <div><img src='images (19).jpeg' title="Coffee 3" /></div>
</div>


</body>
</html>
