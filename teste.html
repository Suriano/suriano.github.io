
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic bxSlider Example</title>
    <!-- 1. Load bxSlider CSS -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    
    <!-- 2. Load jQuery (Required) -->
    <script src="https://googleapis.com"></script>
    
    <!-- 3. Load bxSlider JS -->
    <script src="https://jsdelivr.net"></script>

    <!-- 4. Initialize the Slider -->
    <script>
        $(document).ready(function(){
            $('.bxslider').bxSlider({
                mode: 'horizontal', // Transition mode ('horizontal', 'vertical', 'fade')
                speed: 500,         // Slide transition speed in ms
                captions: true,     // Enable image title captions
                auto: true          // Slideshow starts automatically
            });
        });
    </script>
</head>
<body>

    <div class="slider-container" style="max-width: 800px; margin: 0 auto;">
        <!-- The slider markup uses an unordered list -->
        <ul class="bxslider">
            <li><img src="https://picsum.photos" title="Caption for Image 1"></li>
            <li><img src="https://picsum.photos" title="Caption for Image 2"></li>
            <li><img src="https://picsum.photos" title="Caption for Image 3"></li>
        </ul>
    </div>

</body>
</html>
